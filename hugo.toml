baseURL = 'https://www.maltedahlberg.com'
locale = 'en-us'
title = 'Malte Dahlberg Website'

[build]
  [build.buildStats]
    enable = true
  [[build.cachebusters]]
    source = 'assets/notwatching/hugo_stats\.json'
    target = 'css'
  [[build.cachebusters]]
    source = '(postcss|tailwind)\.config\.js'
    target = 'css'
[module]
  [[module.mounts]]
    source = 'assets'
    target = 'assets'
  [[module.mounts]]
    disableWatch = true
    source = 'hugo_stats.json'
    target = 'assets/notwatching/hugo_stats.json'
    
    [caches]
      [caches.images]
        dir = ':cacheDir/images'
    
    [markup]
      [markup.goldmark]
        [markup.goldmark.renderer]
          unsafe = true
